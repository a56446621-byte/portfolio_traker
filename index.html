<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>포트폴리오 트래커</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f3;--bg2:#fff;--border:#e8e3d9;--text:#2d3436;--text2:#636e72;--text3:#9e9a90;--white:#1a1a1a;--green:#3d7a4a;--red:#c0392b;--blue:#2874a6;--yellow:#b7950b;--purple:#6c3483;--gbg:rgba(61,122,74,.06);--rbg:rgba(192,57,43,.06);--mono:'JetBrains Mono',monospace;--sans:'Noto Sans KR',-apple-system,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
button{cursor:pointer;font-family:var(--sans);transition:all .15s;border:none}button:active{transform:scale(.97)}
input,select,textarea{font-family:var(--mono);transition:all .15s}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)!important;box-shadow:0 0 0 2px rgba(61,122,74,.1)}
textarea{font-family:var(--sans);resize:vertical}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.container{max-width:1280px;margin:0 auto;padding:20px 16px}
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.title{font-family:var(--mono);font-size:19px;font-weight:700;color:var(--white);letter-spacing:1px}.title .dot{color:var(--green)}
.sub{color:var(--text3);font-size:10px;margin-top:3px;font-family:var(--mono);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tabs{display:flex;gap:0;margin:16px 0 14px;border-bottom:2px solid var(--border)}
.tab{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text3);background:none;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab:hover{color:var(--text2);background:#f5f2ec}.tab.active{color:var(--green);border-bottom-color:var(--green);background:var(--gbg)}
.g{background:var(--bg2);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:500}
.g:hover{border-color:#bbb;background:#f5f2ec}
.p{background:var(--green);color:#fff;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px}
.card-t{font-size:12px;color:var(--text2);font-weight:600;font-family:var(--mono);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:14px}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.sum-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono);font-weight:500}
.sum-value{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--white)}.sum-value.sm{font-size:16px;color:var(--text)}
.charts-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.empty-box{height:200px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:12px;text-align:center}
.log-bar{display:flex;flex-wrap:wrap;gap:4px;background:#f5f2ec;border:1px solid var(--border);border-radius:8px;padding:6px 10px;margin-bottom:10px;font-family:var(--mono);font-size:11px}
table{width:100%;border-collapse:collapse}
th{padding:7px 8px;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-family:var(--mono);font-weight:500;border-bottom:1px solid var(--border)}
.arow{border-bottom:1px solid #f0ece4;animation:slideUp .3s ease forwards;cursor:pointer}.arow:hover{background:#faf7f0}
td{padding:9px 8px;font-size:12px;vertical-align:middle}.td-r{font-family:var(--mono);text-align:right;color:var(--text)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600}
.bc{background:#f3e8ff;color:var(--purple);border:1px solid #e0cffc}
.bs{background:#e8f0fe;color:var(--blue);border:1px solid #c5d9f0}
.bk{background:#fef3e0;color:#b7750b;border:1px solid #f0ddb8}
.bca{background:#fdf6e3;color:var(--yellow);border:1px solid #e8dbb8}
.an{color:var(--white);font-weight:600;font-size:13px}.at{color:var(--text3);font-size:10px;font-family:var(--mono)}
.src{font-size:8px;color:var(--green);background:var(--gbg);padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600}
.wt{width:40px;height:4px;background:#eee;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:4px}.wf{height:100%;border-radius:2px;transition:width .4s}
.ib{background:none;border:none;padding:3px 5px;border-radius:4px;font-size:10px;font-weight:500}.ib:hover{background:#f0ece4}
.txp{background:#faf7f0;border-top:1px solid var(--border);padding:10px 14px 10px 40px}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;width:92%;max-width:440px;max-height:90vh;overflow-y:auto;animation:slideUp .25s;box-shadow:0 8px 30px rgba(0,0,0,.08)}
.mt{font-size:16px;font-weight:600;color:var(--white);margin-bottom:16px}
.fg{margin-bottom:12px}.lb{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--text3);margin-bottom:4px;font-family:var(--mono)}
.inp{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--white);font-size:13px}
.mbtn{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.tbs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tb{flex:1;min-width:60px;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:11px;font-weight:500}
.tb.active{background:var(--gbg);border-color:var(--green);color:var(--green)}
.ibox{background:#f9f7f2;border:1px solid #e8e3d9;border-radius:8px;padding:12px;margin-bottom:12px}
.ni{padding:14px 16px;border-bottom:1px solid #f0ece4}.ni:hover{background:#faf7f0}.ni:last-child{border-bottom:none}
.nt{font-size:13px;font-weight:600;color:var(--white);line-height:1.5;margin-bottom:2px}.nt a{color:inherit;text-decoration:none}.nt a:hover{color:var(--blue);text-decoration:underline}
.ntl{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:4px}
.nm{font-size:10px;color:var(--text3);font-family:var(--mono);display:flex;gap:8px;align-items:center}
.nb{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600;background:var(--gbg);color:var(--green)}
.fb{padding:4px 10px;border-radius:16px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text2)}.fb.active{background:var(--gbg);border-color:var(--green);color:var(--green)}
.macro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:800px){.macro-grid{grid-template-columns:1fr}}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.mct{padding:10px 14px;font-size:12px;font-weight:600;color:var(--text2);font-family:var(--mono);border-bottom:1px solid var(--border)}
.pi{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0ece4}.pi:last-child{border-bottom:none}
.pn{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);min-width:24px}
.je{padding:14px 16px;border-bottom:1px solid #f0ece4}.je:last-child{border-bottom:none}
.jd{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:4px}
.ja{font-size:13px;font-weight:600;color:var(--white);margin-bottom:4px}
.jr{font-size:12px;color:var(--text2);line-height:1.5;background:#f9f7f2;padding:8px 10px;border-radius:6px;margin-top:6px}
.tgt-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0ece4;font-size:12px}
.tgt-row:last-child{border-bottom:none}
.tgt-name{flex:1;font-weight:600;color:var(--white)}
.tgt-cur,.tgt-goal,.tgt-diff{width:70px;text-align:right;font-family:var(--mono);font-size:11px}
.tgt-inp{width:60px;padding:4px 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg);font-size:11px;text-align:right;font-family:var(--mono)}
.tgt-action{width:60px;text-align:center;font-size:10px;font-weight:600;border-radius:4px;padding:2px 6px}
.help-btn{background:var(--green);color:#fff;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;box-shadow:0 2px 8px rgba(61,122,74,.25);letter-spacing:.5px}
.help-btn:hover{background:#2e6339;box-shadow:0 3px 12px rgba(61,122,74,.35)}
.help-body{font-size:13px;color:var(--text);line-height:1.8}
.help-body h4{font-size:14px;font-weight:700;color:var(--white);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.help-body table{width:100%;border-collapse:collapse;margin:8px 0 12px}
.help-body th{text-align:left;font-size:11px;color:var(--text3);padding:6px 8px;border-bottom:1px solid var(--border);font-family:var(--mono)}
.help-body td{padding:6px 8px;font-size:12px;border-bottom:1px solid #f0ece4;vertical-align:top}
.help-body li{margin-bottom:4px}
</style>
</head>

<script>

const COLORS=["#3d7a4a","#2874a6","#c0392b","#b7950b","#6c3483","#e67e22","#1abc9c","#e74c3c","#8e44ad","#27ae60"];
const TY={crypto:{l:"코인",i:"₿"},stock:{l:"미국주식",i:"📈"},kr_stock:{l:"한국주식",i:"🇰🇷"},cash:{l:"현금",i:"💵"}};
const MACROS=[
  {title:"Net Liquidity (WALCL−TGA−RRP)",sym:"FRED:WALCL-FRED:WTREGEN-FRED:RRPONTSYD",subLinks:[
    {label:"📊 WALCL (연준 자산)",url:"https://www.tradingview.com/chart/?symbol=FRED%3AWALCL"},
    {label:"📊 WTREGEN (재무부 일반계좌)",url:"https://www.tradingview.com/chart/?symbol=FRED%3AWTREGEN"},

  {title:"미시간 소비자심리지수",sym:"FRED:UMCSENT",subLinks:[{label:"📊 ISM 제조업지수(USBCOI) 보기 →",url:"https://www.tradingview.com/chart/?symbol=ECONOMICS%3AUSBCOI"}]},
  {title:"미국 10년 실질금리 (TIPS)",sym:"FRED:DFII10",subLinks:[{label:"📊 US10Y (명목 10년물) 보기 →",url:"https://www.tradingview.com/chart/?symbol=TVC%3AUS10Y"}]},
  {title:"WTI 원유",sym:"TVC:USOIL"},

const HELP={
portfolio:`<h4>시작하기</h4>
<p>브라우저에서 실행되는 포트폴리오 관리 도구입니다. 모든 데이터는 내 브라우저에만 저장되며, 서버로 전송되지 않습니다.</p>
<p><b>지원 자산:</b> ₿ 코인 (Upbit) · 📈 미국주식 (TwelveData/Finnhub/Yahoo) · 🇰🇷 한국주식 (네이버/Yahoo) · 💵 현금 (KRW/USD)</p>
<h4>API 키 등록 (선택)</h4>
<p>미국주식 실시간 가격은 Finnhub, 과거 데이터는 Twelve Data를 우선 사용합니다. 없으면 다음 소스로 자동 대체됩니다.</p>
<ol><li><b>Finnhub</b> — <a href="https://finnhub.io" target="_blank" style="color:var(--blue)">finnhub.io</a> 가입 (무료) → API Key 복사</li><li><b>Twelve Data</b> — <a href="https://twelvedata.com" target="_blank" style="color:var(--blue)">twelvedata.com</a> 가입 (무료 800콜/일) → API Key 복사</li><li>⚙️ 설정 → 각 키 붙여넣기 → 저장</li></ol>
<p style="font-size:11px;color:var(--text3);line-height:1.6"><b>Fallback 순서:</b><br>📈 미국주식 현재가: Finnhub → TwelveData → Yahoo<br>📈 미국주식 추이: TwelveData → Finnhub → Yahoo<br>🇰🇷 한국주식 현재가: 네이버 → Yahoo<br>🇰🇷 한국주식 추이: 네이버 → Yahoo (프록시 4중 경유)<br>₿ 코인: Upbit → TwelveData(USD×환율)</p>
<h4>상단 버튼</h4>
<table><tr><th>버튼</th><th>기능</th></tr>
<tr><td>⚙️ 설정</td><td>Finnhub / Twelve Data API 키 입력, 데이터 백업/복구</td></tr>
<tr><td>⟳ 갱신</td><td>현재가 조회 + 과거 데이터를 한번에 불러옵니다. 결과는 "현재가" / "추이" 로 분리 표시됩니다</td></tr>
<tr><td>📷 캡처</td><td>증권사 앱 스크린샷을 Gemini AI로 인식하여 보유 종목을 자동 입력합니다. ⚙️ 설정에서 Gemini API 키를 먼저 등록하세요 (무료 분당 15회, 일 1,500회)</td></tr>
<tr><td>🗑 초기화</td><td>모든 자산과 히스토리 삭제</td></tr>
<tr><td>+ 자산 추가</td><td>새 자산 등록</td></tr></table>
<h4>보유 자산 테이블</h4>
<ul><li>행을 클릭하면 <b>거래 내역</b>이 펼쳐집니다 (현금 포함)</li>
<li><b>💰 매수/매도</b> — 거래 추가. 연결된 현금 계좌에서 자동 차감/입금됩니다</li>
<li><b>💰 입금/출금</b> — 현금 자산의 수동 입출금</li>
<li><b>거래 삭제</b> — 주식/코인 거래 삭제 시 연결된 현금 기록도 함께 삭제됩니다</li>
<li><b>🗑 삭제</b> — 해당 자산 삭제</li></ul>
<h4>자산 변화 추이</h4>
<p>날짜별 <b>실제 보유 수량</b>을 기준으로 자산 가치를 계산합니다. 매수 시점에 자산이 증가하고, 매도 시점에 감소하며, 현금 입출금도 반영됩니다.</p>
<h4>🎯 목표 비중</h4>
<p>각 자산의 목표 비중(%)을 입력하면 현재 비중과의 차이를 계산하여 "매수 필요" / "매도 필요" / "유지"를 표시합니다. <b>💾 목표 비중 저장</b>을 눌러야 유지됩니다.</p>
<h4>백업 / 복구</h4>
<p><b>⚙️ 설정</b> 안에 백업·복구 버튼이 있습니다.</p>
<ul><li><b>📥 백업</b> — 모든 데이터(자산, 거래내역, 히스토리, 원칙, 일지, 목표 비중)를 JSON 파일로 다운로드합니다</li>
<li><b>📤 복구</b> — 백업 JSON 파일을 업로드하면 데이터가 복원됩니다. 컴퓨터나 브라우저가 바뀌어도 이 파일만 있으면 됩니다</li></ul>
<p>중요한 데이터를 입력한 후에는 주기적으로 백업하는 것을 권장합니다.</p>`,

function genId(){return 'tx-'+Date.now()+'-'+Math.random().toString(36).slice(2,6)}
(function migrate(){
  let changed=false;
  const earliest=S.assets.flatMap(a=>(a.transactions||[]).map(t=>t.date)).sort()[0]||new Date().toISOString().split("T")[0];
  for(const a of S.assets){
    if(a.transactions){a.transactions.forEach(tx=>{if(!tx.id){tx.id=genId();changed=true}})}

})();

function calcM(txs=[]){let bQ=0,bC=0,sQ=0,rP=0;txs.filter(t=>t.type==="buy").forEach(t=>{bQ+=t.qty;bC+=t.qty*t.price});const avg=bQ>0?bC/bQ:0;txs.filter(t=>t.type==="sell").forEach(t=>{sQ+=t.qty;rP+=(t.price-avg)*t.qty});return{qty:bQ-sQ,avg,cost:(bQ-sQ)*avg,realPnl:rP}}
function qtyAtDate(a,date){let q=0;for(const tx of (a.transactions||[])){if(tx.date>date)continue;if(tx.type==='buy')q+=tx.qty;if(tx.type==='sell')q-=tx.qty}return q}
function cashBal(a){let b=0;for(const tx of (a.transactions||[])){if(tx.type==='deposit'||tx.type==='sell_in')b+=tx.amount;if(tx.type==='withdraw'||tx.type==='buy_out')b-=tx.amount}return b}
function cashBalAtDate(a,date){let b=0;for(const tx of (a.transactions||[])){if(tx.date>date)continue;if(tx.type==='deposit'||tx.type==='sell_in')b+=tx.amount;if(tx.type==='withdraw'||tx.type==='buy_out')b-=tx.amount}return b}
function calcRK(a){if(a.type==="cash"){return 0}if(isK(a)){return calcM(a.transactions).realPnl}
  const txs=a.transactions||[];let bQ=0,bC=0;txs.filter(t=>t.type==="buy").forEach(t=>{bQ+=t.qty;bC+=t.qty*t.price});const avg=bQ>0?bC/bQ:0;let total=0;
  txs.filter(t=>t.type==="sell").forEach(t=>{const er=t.er||S.settings.exchangeRate;total+=(t.price-avg)*t.qty*er});return total}
function isK(a){return a.type==="crypto"||a.type==="kr_stock"}
function getYT(a){if(a.type==="kr_stock"){const c=a.ticker.replace(/\.(KS|KQ)$/i,"");return c+(a.market==="kosdaq"?".KQ":".KS")}return a.ticker}
function gV(a){if(a.type==="cash"){return cashBal(a)*(a.currency==="USD"?S.settings.exchangeRate:1)}const m=calcM(a.transactions),p=S.prices[a.ticker];if(!p||m.qty<=0){return 0}return isK(a)?m.qty*p.price:m.qty*p.price*S.settings.exchangeRate}
function gC(a){if(a.type==="cash"){return cashBal(a)*(a.currency==="USD"?S.settings.exchangeRate:1)}const m=calcM(a.transactions);return isK(a)?m.cost:m.cost*S.settings.exchangeRate}
function tV(){return S.assets.reduce((s,a)=>s+gV(a),0)}
function tC(){return S.assets.reduce((s,a)=>s+gC(a),0)}
function gR(d){const h=S.history;if(h.length<2){return null}const tv=h[h.length-1]?.totalValue;const tgt=new Date();tgt.setDate(tgt.getDate()-d);const ts=tgt.toISOString().split("T")[0];let cl=null;for(const e of h){if(e.date<=ts){cl=e}}if(!cl?.totalValue){return null}return((tv-cl.totalValue)/cl.totalValue)*100}

  let warmedUp=false;
  for(const date of dates){
    for(const at of assetTxs){const a=at.asset;while(at.cursor<at.txs.length&&at.txs[at.cursor].date<=date){const tx=at.txs[at.cursor];if(a.type==="cash"){if(tx.type==="deposit"||tx.type==="sell_in")runCash[a.id]+=tx.amount;if(tx.type==="withdraw"||tx.type==="buy_out")runCash[a.id]-=tx.amount}else{if(tx.type==="buy")runQty[a.id]+=tx.qty;if(tx.type==="sell")runQty[a.id]-=tx.qty}at.cursor++}}
    let t=0;
    for(const a of S.assets){
      if(a.type==="cash"){const cb=date<(firstTxDate[a.id]||"9")? (estCash[a.id]||0):runCash[a.id];t+=cb*(a.currency==="USD"?rate:1);continue}
      const isEst=date<(firstTxDate[a.id]||"9");const qty=isEst?(estQty[a.id]||0):runQty[a.id];if(!qty||qty<=0)continue;
      const pm2=priceMap[a.ticker];if(!pm2)continue;
      const pr=pm2.map.get(date);if(pr!=null){lastPrice[a.ticker]=pr}
      const useP=lastPrice[a.ticker];if(useP!=null&&useP>0){t+=qty*(pm2.cur==="USD"?useP*rate:useP)}
    }
    if(!warmedUp){let ok=true;for(const a of S.assets){if(a.type==="cash")continue;if(!priceMap[a.ticker])continue;const q=(date<(firstTxDate[a.id]||"9"))?(estQty[a.id]||0):runQty[a.id];if(q>0&&!lastPrice[a.ticker]){ok=false;break}}if(ok)warmedUp=true}
    if(warmedUp){nh.push({date,totalValue:t,estimated:date<firstRealDate})}
  }
  const today=new Date().toISOString().split("T")[0],tv=tV();if(tv>0){const ti=nh.findIndex(h=>h.date===today);if(ti>=0){nh[ti].totalValue=tv}else{nh.push({date:today,totalValue:tv})}}
  if(!nh.length){setState({backfillLog:bfLog,history:oldH,backfilling:false});return}
  sv(SK.h,nh.slice(-400));setState({backfillLog:bfLog,history:nh.slice(-400),backfilling:false})
  }catch(err){console.error("backfill error:",err);bfLog.push({ticker:"시스템",ok:false,msg:err.message});setState({backfillLog:bfLog,history:oldH,backfilling:false})}}

// ═══ OCR (Gemini) ═══
const OCR_PROMPT=`이 증권사 앱 스크린샷에서 보유 종목 정보를 추출하세요.
반드시 다음 JSON 배열만 출력하세요 (설명 없이, 마크다운 없이, 순수 JSON만):
[{"name":"종목명","ticker":"티커코드","qty":수량,"avgPrice":평균매입단가,"type":"kr_stock|stock|crypto"}]
규칙:
- type: 한국주식=kr_stock, 미국주식=stock, 암호화폐=crypto
- 한국주식 ticker: 6자리 숫자 (예: 005930)
- 미국주식 ticker: 영문 대문자 (예: AAPL)
- 코인 ticker: KRW-BTC 형태
- 종목코드가 안 보이면 종목명으로 추정하세요
- 수량과 평단가의 쉼표/통화기호는 제거하고 숫자만`;

async function callGeminiOcr(base64,mimeType){
  const key=S.settings.geminiKey;
  if(!key){throw new Error("Gemini API 키가 설정되지 않았습니다. ⚙️ 설정에서 등록하세요.")}
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:mimeType,data:base64}},{text:OCR_PROMPT}]}]})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`Gemini API 오류: ${e.error?.message||r.status}`)}
  const d=await r.json();const txt=d.candidates?.[0]?.content?.parts?.[0]?.text||"";return parseOcrJson(txt)
}

function parseOcrJson(txt){
  const clean=txt.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  const m=clean.match(/\[[\s\S]*\]/);
  if(!m){throw new Error("AI 응답에서 JSON을 찾을 수 없습니다.")}
  const arr=JSON.parse(m[0]);
  return arr.map(item=>({
    name:String(item.name||"").trim(),
    ticker:String(item.ticker||"").toUpperCase().trim(),
    qty:parseFloat(item.qty)||0,
    avgPrice:parseFloat(item.avgPrice)||0,
    type:item.type||"kr_stock",
    checked:true
  }))
}

async function processOcrFile(input){
  const file=input.files?.[0];if(!file){return}
  if(!file.type.startsWith("image/")){return alert("이미지 파일만 지원합니다.")}
  S.ocrLoading=true;S.ocrResults=null;render();openModal("ocrPreview");
  try{
    const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("파일 읽기 실패"));r.readAsDataURL(file)});
    const results=await callGeminiOcr(base64,file.type);
    S.ocrResults=results;S.ocrLoading=false;render();openModal("ocrPreview")
  }catch(e){S.ocrLoading=false;S.ocrResults=null;render();alert("OCR 오류: "+e.message)}
}

function toggleOcrItem(i){if(S.ocrResults&&S.ocrResults[i]){S.ocrResults[i].checked=!S.ocrResults[i].checked;render();openModal("ocrPreview")}}

function submitOcr(){
  const items=(S.ocrResults||[]).filter(r=>r.checked&&r.ticker&&r.qty>0);
  if(!items.length){return alert("추가할 항목을 선택하세요.")}
  const dt=new Date().toISOString().split("T")[0];
  for(const item of items){
    const txId=genId();const txs=[];
    if(item.qty>0&&item.avgPrice>0){txs.push({id:txId,date:dt,type:"buy",qty:item.qty,price:item.avgPrice,er:S.settings.exchangeRate})}
    const asset={id:Date.now().toString()+Math.random().toString(36).slice(2,4),type:item.type,ticker:item.type==="crypto"?(item.ticker.startsWith("KRW-")?item.ticker:"KRW-"+item.ticker):item.type==="kr_stock"?(item.ticker.match(/^\d{6}$/)?item.ticker+".KS":item.ticker):item.ticker,name:item.name,transactions:txs};
    if(item.type==="kr_stock"){asset.market=item.ticker.endsWith(".KQ")?"kosdaq":"kospi"}
    S.assets.push(asset);
    // Cash link
    if(txs.length>0){
      const kr=isK(asset);const cur=kr?"KRW":"USD";const amt=item.qty*item.avgPrice;
      let cash=S.assets.find(c=>c.type==="cash"&&c.currency===cur);
      if(!cash){cash={id:"cash-"+cur+"-"+Date.now(),type:"cash",name:cur==="KRW"?"현금(원)":"현금(달러)",currency:cur,transactions:[]};S.assets.push(cash)}
      if(!cash.transactions){cash.transactions=[]}
      cash.transactions.push({id:genId(),type:"buy_out",date:dt,amount:amt,linkedTxId:txId,linkedAsset:item.name});
      S.journal.push({date:dt,action:`${item.name} ${fQ(item.qty)} 매수 @ ${kr?fK(item.avgPrice):"$"+item.avgPrice.toFixed(2)}`,reason:"OCR 캡처 입력",auto:true})
    }
  }
  sv(SK.a,S.assets);sv(SK.jn,S.journal);S.ocrResults=null;closeModal();refreshAll()
}

// ═══ FORMAT ═══
function fK(n){return`₩${Math.round(n||0).toLocaleString()}`}
function fP(n){if(n==null||isNaN(n)){return"0.00%"}return`${n>0?"+":""}${n.toFixed(2)}%`}
function fQ(n){return n>=1?n.toLocaleString(undefined,{maximumFractionDigits:4}):n.toFixed(6)}
function fCo(n){const a=Math.abs(n);if(a>=1e8){return`${(n/1e8).toFixed(1)}억`}if(a>=1e4){return`${(n/1e4).toFixed(0)}만`}return Math.round(n).toLocaleString()}
function tA(ts){if(!ts){return""}const d=Math.floor((Date.now()/1000-ts)/60);if(d<60){return`${d}분 전`}if(d<1440){return`${Math.floor(d/60)}시간 전`}return`${Math.floor(d/1440)}일 전`}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}

  if(isE&&a.transactions?.length>0){const sorted=[...a.transactions].sort((x,y)=>x.date.localeCompare(y.date));if(ic){const sym=a.currency==="USD"?"$":"₩";rows+=`<tr><td colspan="11" style="padding:0"><div class="txp"><div style="margin-bottom:6px"><span style="font-size:12px;font-weight:600;color:var(--text2)">거래 내역 (${a.transactions.length}건)</span></div><table><thead><tr>${["날짜","유형","금액","관련 자산",""].map((h,j)=>`<th style="font-size:9px;padding:4px 8px;text-align:${j===2?"right":"left"}">${h}</th>`).join("")}</tr></thead><tbody>${sorted.map(tx=>{const tl={"deposit":"입금","withdraw":"출금","buy_out":"매수 차감","sell_in":"매도 입금"};const tc2=tx.type==="deposit"||tx.type==="sell_in"?"var(--green)":"var(--red)";const sign=tx.type==="deposit"||tx.type==="sell_in"?"+":"-";return`<tr style="border-bottom:1px solid #f0ece4"><td style="padding:4px 8px;font-size:11px;color:var(--text2)">${tx.date}</td><td style="padding:4px 8px"><span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;color:${tc2};background:${tx.type==="deposit"||tx.type==="sell_in"?"var(--gbg)":"var(--rbg)"}">${tl[tx.type]||tx.type}</span></td><td class="td-r" style="padding:4px 8px;font-size:11px;font-weight:500;color:${tc2}">${sign}${sym}${Math.round(tx.amount).toLocaleString()}</td><td style="padding:4px 8px;font-size:10px;color:var(--text3)">${tx.linkedAsset||tx.note||""}</td><td style="text-align:center">${tx.linkedTxId?"":`<button class="ib" style="font-size:10px" onclick="delCashTx('${a.id}','${tx.id}')">✕</button>`}</td></tr>`}).join("")}</tbody></table></div></td></tr>`}else{rows+=`<tr><td colspan="11" style="padding:0"><div class="txp"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;font-weight:600;color:var(--text2)">거래 (${a.transactions.length}건)</span><span style="font-size:11px;color:var(--text3)">실현 손익: <span style="color:${calcRK(a)>=0?"var(--green)":"var(--red)"}">${fK(calcRK(a))}</span></span></div><table><thead><tr>${["날짜","유형","수량","단가","합계",""].map((h,j)=>`<th style="font-size:9px;padding:4px 8px;text-align:${j>=2?"right":"left"}">${h}</th>`).join("")}</tr></thead><tbody>${sorted.map(tx=>`<tr style="border-bottom:1px solid #f0ece4"><td style="padding:4px 8px;font-size:11px;color:var(--text2)">${tx.date}</td><td style="padding:4px 8px"><span style="font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;color:${tx.type==="buy"?"var(--green)":"var(--red)"};background:${tx.type==="buy"?"var(--gbg)":"var(--rbg)"}">${tx.type==="buy"?"매수":"매도"}</span></td><td class="td-r" style="padding:4px 8px;font-size:11px">${fQ(tx.qty)}</td><td class="td-r" style="padding:4px 8px;font-size:11px">${kr?fK(tx.price):`$${tx.price.toFixed(2)}`}</td><td class="td-r" style="padding:4px 8px;font-size:11px;font-weight:500">${kr?fK(tx.qty*tx.price):`$${(tx.qty*tx.price).toFixed(2)}`}</td><td style="text-align:center"><button class="ib" style="font-size:10px" onclick="event.stopPropagation();openModal('editTx','${a.id}','${tx.id}')">✏️</button><button class="ib" style="font-size:10px" onclick="delTx('${a.id}','${tx.id}')">✕</button></td></tr>`).join("")}</tbody></table></div></td></tr>`}}return rows}).join("")}</tbody></table></div></div>`}

function renderStatusBar(title,items,loading=false){if(!items||items.length===0){return`<div class="log-bar"><span style="margin-right:8px;font-weight:700;color:var(--text2)">${title}:</span><span style="color:var(--text3)">${loading?"⏳ 갱신중...":"대기중"}</span></div>`}return`<div class="log-bar"><span style="margin-right:8px;font-weight:700;color:var(--text2)">${title}:</span>${items.map(item=>{const c=item.ok?"var(--green)":"var(--red)";const ic=item.ok?"✅":"❌";const extra=[item.src,item.msg].filter(Boolean).join(" · ");return`<span style="margin-right:8px;color:${c}">${ic} ${item.ticker}${extra?` (${extra})`:""}</span>`}).join("")}</div>`}
function rLogBar(){return`${renderStatusBar("현재가",S.fetchLog,S.fetching)}${renderStatusBar("추이",S.backfillLog,S.backfilling)}`}

function rRealPnl(){
  const items=S.assets.filter(a=>a.type!=="cash").map(a=>{
    const rKrw=calcRK(a);const kr=isK(a);
    const sellTxs=a.transactions?.filter(t=>t.type==="sell")||[];
    const avgSell=sellTxs.length>0?sellTxs.reduce((s,t)=>s+t.price*t.qty,0)/sellTxs.reduce((s,t)=>s+t.qty,0):0;
    return{name:a.name||a.ticker,ticker:a.ticker,rKrw,avgSell,kr,sellCount:sellTxs.length};
  }).filter(i=>i.sellCount>0).sort((a,b)=>b.rKrw-a.rKrw);
  const total=items.reduce((s,i)=>s+i.rKrw,0);
  if(items.length===0){return`<div class="card" style="animation:slideUp .3s"><div style="padding:16px;text-align:center;color:var(--text3);font-size:12px">매도 거래가 없습니다</div></div>`}
  return`<div class="card" style="animation:slideUp .3s"><div class="card-t">📊 종목별 실현 손익</div>
<div style="display:flex;flex-direction:column;gap:0">${items.map(i=>`<div style="display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0ece4">
  <span style="flex:1;font-weight:600;font-size:13px;color:var(--white)">${i.name}<span style="font-size:10px;color:var(--text3);margin-left:6px;font-family:var(--mono)">${i.ticker}</span></span>
  <span style="width:100px;text-align:right;font-size:11px;color:var(--text3);font-family:var(--mono)">${i.kr?fK(i.avgSell):"$"+i.avgSell.toFixed(2)}</span>
  <span style="width:120px;text-align:right;font-weight:700;font-family:var(--mono);font-size:13px;color:${i.rKrw>=0?"var(--green)":"var(--red)"}">${i.rKrw>=0?"+":""}${fK(i.rKrw)}</span>
</div>`).join("")}
<div style="display:flex;align-items:center;padding:12px 0;font-weight:700">
  <span style="flex:1;font-size:14px;color:var(--white)">합계</span>
  <span style="width:120px;text-align:right;font-family:var(--mono);font-size:16px;color:${total>=0?"var(--green)":"var(--red)"}">${total>=0?"+":""}${fK(total)}</span>
</div></div></div>`}

function rTarget(){const tv=tV();if(tv<=0){return""}const tgtAssets=S.hideZero?S.assets.filter(a=>{if(a.type==="cash")return true;return calcM(a.transactions).qty>0}):S.assets;const sum=tgtAssets.reduce((s,a)=>s+parseFloat(S.targets[a.id]||0),0);const sumOk=Math.abs(sum-100)<=0.1;const sumCol=sumOk?"var(--green)":"var(--red)";
  return`<div class="card"><div class="card-t">🎯 목표 비중 vs 현재 비중 <span id="tgtSum" style="font-size:10px;color:${sumCol}">합계: ${sum.toFixed(1)}%</span></div>
<div class="tgt-row" style="font-weight:600;color:var(--text3);font-size:10px;border-bottom:1px solid var(--border)"><span class="tgt-name" style="color:var(--text3)">자산</span><span class="tgt-cur">현재</span><span class="tgt-goal">목표</span><span class="tgt-diff">차이</span><span class="tgt-action">조정</span></div>
${tgtAssets.map(a=>{const cur=(gV(a)/tv*100);const goal=parseFloat(S.targets[a.id]||0);const diff=cur-goal;const action=Math.abs(diff)<1?"유지":diff>0?"매도 필요":"매수 필요";const acol=Math.abs(diff)<1?"var(--text3)":diff>0?"var(--red)":"var(--green)";
  return`<div class="tgt-row"><span class="tgt-name">${a.name||a.ticker}</span><span class="tgt-cur">${cur.toFixed(1)}%</span><span class="tgt-goal"><input class="tgt-inp" type="number" step="0.1" value="${goal||""}" onchange="setTarget('${a.id}',this.value)" placeholder="0"></span><span id="tgtd_${a.id}" class="tgt-diff" style="color:${acol}">${diff>=0?"+":""}${diff.toFixed(1)}%</span><span id="tgta_${a.id}" class="tgt-action" style="color:${acol}">${goal?action:"-"}</span></div>`}).join("")}
<button class="g" onclick="saveTargets()" style="margin-top:8px;font-size:10px">💾 목표 비중 저장</button></div>`}

function saveSett(){S.settings.finnhubKey=document.getElementById("sK")?.value?.trim()||"";S.settings.twelveDataKey=document.getElementById("sTD")?.value?.trim()||"";S.settings.geminiKey=document.getElementById("sGK")?.value?.trim()||"";sv(SK.s,S.settings);closeModal()}
function exportBackup(){
  const data={};const keys=["pf15-a","pf15-h","pf15-s","pf15-pr","pf15-jn","pf15-tg","pf15-cc"];
  keys.forEach(k=>{const v=localStorage.getItem(k);if(v){data[k]=JSON.parse(v)}});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`portfolio-backup-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(a.href);
}
function importBackup(input){
  const file=input.files?.[0];if(!file){return}
  const reader=new FileReader();reader.onload=e=>{
    try{const data=JSON.parse(e.target.result);
      const valid=Object.keys(data).some(k=>k.startsWith("pf15-"));
      if(!valid){return alert("유효하지 않은 백업 파일입니다.")}
      if(!confirm("⚠️ 기존 데이터를 덮어씁니다. 계속하시겠습니까?")){return}
      Object.entries(data).forEach(([k,v])=>{localStorage.setItem(k,JSON.stringify(v))});
      alert("✅ 복구 완료. 페이지를 새로고침합니다.");location.reload();
    }catch{alert("파일을 읽을 수 없습니다.")}
  };reader.readAsText(file);input.value="";
}
function subAdd(){const t=addTp;if(t==="cash"){const initAmt=parseFloat(document.getElementById("aAm")?.value)||0;const txs=[];if(initAmt>0){txs.push({id:genId(),type:"deposit",date:new Date().toISOString().split("T")[0],amount:initAmt})}S.assets.push({id:Date.now().toString(),type:"cash",name:document.getElementById("aN")?.value||"현금",currency:document.getElementById("aCr")?.value||"KRW",transactions:txs})}else{const tk=document.getElementById("aTk")?.value?.toUpperCase().trim();if(!tk){return alert("티커를 입력하세요")}const n=document.getElementById("aN")?.value||tk,q=parseFloat(document.getElementById("aQ")?.value)||0,p=parseFloat(document.getElementById("aP")?.value)||0,dt=document.getElementById("aDt")?.value||new Date().toISOString().split("T")[0];const txs=[];if(q>0&&p>0){const txId=genId();txs.push({id:txId,date:dt,type:"buy",qty:q,price:p,er:S.settings.exchangeRate});const kr=isK({type:t});const cur=kr?"KRW":"USD";const amt=q*p;let cash=S.assets.find(c=>c.type==="cash"&&c.currency===cur);if(!cash){cash={id:"cash-"+cur+"-"+Date.now(),type:"cash",name:cur==="KRW"?"현금(원)":"현금(달러)",currency:cur,transactions:[]};S.assets.push(cash)}if(!cash.transactions){cash.transactions=[]}cash.transactions.push({id:genId(),type:"buy_out",date:dt,amount:amt,linkedTxId:txId,linkedAsset:n});S.journal.push({date:dt,action:`${n} ${fQ(q)} 매수 @ ${kr?fK(p):"$"+p.toFixed(2)}`,reason:"",auto:true});sv(SK.jn,S.journal)}const asset={id:Date.now().toString(),type:t,ticker:tk,name:n,transactions:txs};if(t==="kr_stock"){asset.market=document.getElementById("aMk")?.value||"kospi"}S.assets.push(asset)}sv(SK.a,S.assets);closeModal();refreshAll()}
function subTx(){const aid=document.getElementById("txA")?.value,tp=document.getElementById("txT")?.value,dt=document.getElementById("txD")?.value,q=parseFloat(document.getElementById("txQ")?.value),p2=parseFloat(document.getElementById("txP")?.value);if(!q||!p2){return alert("수량과 단가를 입력하세요")}const a=S.assets.find(a=>a.id===aid);if(!a){return}a.transactions=a.transactions||[];const txId=genId();a.transactions.push({id:txId,date:dt,type:tp,qty:q,price:p2,er:S.settings.exchangeRate});
  // Auto cash update via linked transaction
  const kr=isK(a);const cur=kr?"KRW":"USD";const amt=q*p2;
  let cash=S.assets.find(c=>c.type==="cash"&&c.currency===cur);
  if(!cash){cash={id:"cash-"+cur+"-"+Date.now(),type:"cash",name:cur==="KRW"?"현금(원)":"현금(달러)",currency:cur,transactions:[]};S.assets.push(cash)}
  if(!cash.transactions){cash.transactions=[]}
  cash.transactions.push({id:genId(),type:tp==="buy"?"buy_out":"sell_in",date:dt,amount:amt,linkedTxId:txId,linkedAsset:a.name||a.ticker});
  sv(SK.a,S.assets);
  // Auto journal
  S.journal.push({date:dt,action:`${a.name||a.ticker} ${fQ(q)} ${tp==="buy"?"매수":"매도"} @ ${kr?fK(p2):"$"+p2.toFixed(2)}`,reason:"",auto:true});sv(SK.jn,S.journal);closeModal()}
function subPr(){const t=document.getElementById("prT")?.value?.trim();if(!t){return}S.principles.push({text:t});sv(SK.pr,S.principles);closeModal()}
function subJn(){const dt=document.getElementById("jD")?.value,act=document.getElementById("jA")?.value?.trim(),rs=document.getElementById("jR")?.value?.trim();if(!act){return alert("매매 내용을 입력하세요")}S.journal.push({date:dt,action:act,reason:rs});sv(SK.jn,S.journal);closeModal()}

function delPr(i){if(!confirm("삭제?")){return}S.principles.splice(i,1);sv(SK.pr,S.principles);render()}
function delJn(i){if(!confirm("삭제?")){return}S.journal.splice(i,1);sv(SK.jn,S.journal);render()}
function subEditJn(){const i=parseInt(document.getElementById("ejI")?.value);const dt=document.getElementById("ejD")?.value;const act=document.getElementById("ejA")?.value?.trim();const rs=document.getElementById("ejR")?.value?.trim();if(!act){return alert("매매 내용을 입력하세요")}if(S.journal[i]){S.journal[i].date=dt;S.journal[i].action=act;S.journal[i].reason=rs;sv(SK.jn,S.journal)}closeModal()}
function toggleExp(id){setState({expanded:S.expanded===id?null:id})}
function deleteAsset(id){const a=S.assets.find(a=>a.id===id);if(!confirm(`"${a?.name||a?.ticker}" 삭제?`)){return}S.assets=S.assets.filter(a=>a.id!==id);sv(SK.a,S.assets);render()}
function delTx(aid,tid){const a=S.assets.find(a=>a.id===aid);if(!a){return}if(!confirm("이 거래를 삭제하면 연결된 현금 기록도 함께 삭제됩니다.")){return}a.transactions=a.transactions.filter(t=>t.id!==tid);S.assets.forEach(c=>{if(c.type==="cash"&&c.transactions){c.transactions=c.transactions.filter(t=>t.linkedTxId!==tid)}});sv(SK.a,S.assets);render()}
function delCashTx(aid,tid){if(!confirm("이 현금 거래를 삭제하시겠습니까?")){return}const a=S.assets.find(a=>a.id===aid);if(a&&a.transactions){a.transactions=a.transactions.filter(t=>t.id!==tid)}sv(SK.a,S.assets);render()}
function moveAsset(id,dir){const i=S.assets.findIndex(a=>a.id===id);const j=i+dir;if(j<0||j>=S.assets.length){return}[S.assets[i],S.assets[j]]=[S.assets[j],S.assets[i]];sv(SK.a,S.assets);render()}
function subEditTx(){const aid=document.getElementById("etA")?.value,tid=document.getElementById("etI")?.value;const nd=document.getElementById("etD")?.value,nq=parseFloat(document.getElementById("etQ")?.value),np2=parseFloat(document.getElementById("etP")?.value);if(!nq||!np2){return alert("수량과 단가를 입력하세요")}const a=S.assets.find(a=>a.id===aid);if(!a){return}const tx=a.transactions.find(t=>t.id===tid);if(!tx){return}tx.date=nd;tx.qty=nq;tx.price=np2;const newAmt=nq*np2;S.assets.forEach(c=>{if(c.type==="cash"&&c.transactions){const ct=c.transactions.find(t=>t.linkedTxId===tid);if(ct){ct.date=nd;ct.amount=newAmt}}});sv(SK.a,S.assets);closeModal()}
function subCashTx(){const aid=document.getElementById("cxA")?.value,tp=document.getElementById("cxT")?.value,v=parseFloat(document.getElementById("cxV")?.value);if(!v||v<=0){return alert("금액을 입력하세요")}const a=S.assets.find(a=>a.id===aid);if(!a){return}if(!a.transactions){a.transactions=[]}const bal=cashBal(a);if(tp==="withdraw"&&v>bal){return alert("출금액이 잔액보다 큽니다")}a.transactions.push({id:genId(),type:tp,date:new Date().toISOString().split("T")[0],amount:v});sv(SK.a,S.assets);const sym=a.currency==="USD"?"$":"₩";S.journal.push({date:new Date().toISOString().split("T")[0],action:`${a.name} ${sym}${v.toLocaleString()} ${tp==="deposit"?"입금":"출금"}`,reason:"",auto:true});sv(SK.jn,S.journal);closeModal()}
function setTarget(id,val){S.targets[id]=parseFloat(val)||0;
  // 차이/조정 컬럼만 업데이트 (전체 re-render 안 함)
  const tv2=tV();S.assets.forEach(a=>{
    const cur2=(gV(a)/tv2*100);const gl=parseFloat(S.targets[a.id]||0);const df=cur2-gl;
    const el=document.getElementById("tgtd_"+a.id);if(el){const ac2=Math.abs(df)<1?"var(--text3)":df>0?"var(--red)":"var(--green)";el.style.color=ac2;el.textContent=`${df>=0?"+":""}${df.toFixed(1)}%`}
    const el2=document.getElementById("tgta_"+a.id);if(el2){const ac3=Math.abs(df)<1?"유지":df>0?"매도 필요":"매수 필요";const ac4=Math.abs(df)<1?"var(--text3)":df>0?"var(--red)":"var(--green)";el2.style.color=ac4;el2.textContent=gl?ac3:"-"}
  });
  // 합계 업데이트
  const shown2=S.hideZero?S.assets.filter(a=>a.type==="cash"||calcM(a.transactions).qty>0):S.assets;
  const sum2=shown2.reduce((s,a)=>s+parseFloat(S.targets[a.id]||0),0);const sumEl=document.getElementById("tgtSum");if(sumEl){sumEl.style.color=Math.abs(sum2-100)<=0.1?"var(--green)":"var(--red)";sumEl.textContent=`합계: ${sum2.toFixed(1)}%`}
}
function saveTargets(){sv(SK.tg,S.targets);alert("목표 비중이 저장되었습니다.");render()}
function resetAll(){if(!confirm("⚠️ 모든 데이터가 삭제됩니다.")){return}S.assets=[];S.history=[];S.prices={};S.fetchLog=[];S.backfillLog=null;sv(SK.a,[]);sv(SK.h,[]);render()}
async function loadNews(){S.newsLoading=true;S.news=[];render();const tickers=S.assets.filter(a=>a.type!=="cash").map(a=>(a.type==="crypto"||a.type==="kr_stock")?(a.name||a.ticker):a.ticker);await fetchNews(tickers);S.newsLoading=false;render()}

render();
if(S.assets.length>0){refreshAll()}
</script>
</body>
